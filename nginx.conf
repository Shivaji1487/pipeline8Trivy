server {
    listen 80;
    server_name localhost;

    # 1. Location for Static HTML Files (Frontend)
    # This serves your index, login, and signup pages
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy for Java Backend (API)
    # Any request starting with /api/ is sent to the Java app on 8081
    location /api/ {
        proxy_pass http://localhost:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Custom routes for clean URLs
    location = /login {
        root /usr/share/nginx/html;
        try_files /login.html =404;
    }

    location = /signup {
        root /usr/share/nginx/html;
        try_files /signup.html =404;
    }
}