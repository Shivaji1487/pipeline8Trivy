apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipeline10java-ingress
  namespace: bank-production-v10
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: pipeline10java.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pipeline10java-service
            port:
              number: 80