apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pipeline8-trivy-ingress # All lowercase
  namespace: bank-production-v8
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
  - host: pipeline7helm.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: pipeline8-trivy-service # Match the new Service name
            port:
              number: 80
      - path: /login
        pathType: Prefix
        backend:
          service:
            name: pipeline8-trivy-service
            port:
              number: 80
      - path: /signup
        pathType: Prefix
        backend:
          service:
            name: pipeline8-trivy-service
            port:
              number: 80