apiVersion: apps/v1
kind: Deployment
metadata:
  name: pipeline10java-app
  namespace: bank-production-v10
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pipeline10java-app
  template:
    metadata:
      labels:
        app: pipeline10java-app
    spec:
      containers:
      # Container 1: The Java Backend
      - name: java-backend
        image: sshivaji555/pipeline10java-app:latest
        imagePullPolicy: Always
        ports:
          - containerPort: 8081
        env:
          - name: DB_HOST
            value: "mysql-service"
          - name: DB_USER
            value: "root"
          - name: DB_PASSWORD
            value: "admin123"

      # Container 2: Nginx Proxy
      - name: nginx
        image: nginx:latest
        ports:
          - containerPort: 80
        volumeMounts:
          - name: nginx-config
            mountPath: /etc/nginx/conf.d/default.conf
            subPath: default.conf
      volumes:
        - name: nginx-config
          configMap:
            name: pipeline10-nginx-config