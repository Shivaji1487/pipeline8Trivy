# Server Configuration
# Changing to 8081 to avoid conflict with Jenkins on 8080
server.port=8081

# MySQL Database Connection
# 'mysql-service' is the DNS name of your MySQL service in the cluster
spring.datasource.url=jdbc:mysql://mysql-service:3306/abc_bank?createDatabaseIfNotExist=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=admin123

# JPA / Hibernate Settings
# 'update' automatically creates the 'users' table if it doesn't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect